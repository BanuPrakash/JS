<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Users List</h1>
    <table id="users">
        <thead>
            <tr>
                <th>ID</th> <th>Name</th> <th>Email</th>
            </tr>
        </thead>
        <tbody id="tbody">
        </tbody>
    </table>

    <script>
        let tbody = document.getElementById("tbody");
        fetch("https://jsonplaceholder.typicode.com/users")
            .then(response => response.json())
            .then(users => {
                users.forEach(user => {
                    let tr = document.createElement("tr");
                    let td = document.createElement("td");
                    let txt = document.createTextNode(user.id);
                    td.appendChild(txt);
                    tr.appendChild(td);

                    td = document.createElement("td");
                    txt = document.createTextNode(user.name);
                    td.appendChild(txt);
                    tr.appendChild(td);
                    td = document.createElement("td");
                    txt = document.createTextNode(user.email);
                    td.appendChild(txt);
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                })
            })
    </script>
</body>
</html>
